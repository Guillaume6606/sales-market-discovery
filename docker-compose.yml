# Base services — shared between dev and production.
# Dev ports are in docker-compose.override.yml (auto-loaded by `docker compose up`).
# Production adds Caddy via docker-compose.prod.yml.

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-app}
      POSTGRES_DB: ${POSTGRES_DB:-app}
    volumes:
      - dbdata:/var/lib/postgresql/data

  redis:
    image: redis:7

  backend:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.backend
    env_file: .env
    depends_on: [db, redis]

  ingestion:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.ingestion
    env_file: .env
    depends_on: [db, redis]
    security_opt:
      - seccomp:unconfined
      - no-new-privileges:true
    init: true
    ipc: host
    shm_size: "1gb"
    user: "pwuser"
    environment:
      - PLAYWRIGHT_BROWSERS_PATH=/ms-playwright
      - LOG_LEVEL=DEBUG
    volumes:
      - pwuser-data:/tmp/pwuser
    tmpfs:
      - /home/pwuser/.cache

  ui:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.ui
    env_file: .env
    depends_on: [backend]

volumes:
  dbdata:
  pwuser-data:
